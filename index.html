<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KryptonLegend — Watch Ad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #050816;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: #0b1020;
      padding: 28px;
      border-radius: 16px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    h2 {
      margin-top: 0;
      color: #ff7a1a;
    }

    .loader {
      margin-top: 20px;
      border: 4px solid #333;
      border-top: 4px solid #ff7a1a;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status {
      margin-top: 16px;
      font-size: 15px;
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>KryptonLegend Faucet</h2>
    <p>Preparing your video ad…</p>
    <div class="loader"></div>
    <div class="status" id="status">Starting session…</div>
  </div>

  <script>
    const BACKEND = "https://faucet-backend-uvzt.onrender.com"; // your backend
    const statusEl = document.getElementById("status");

    // Read ?uid= from URL
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("uid");

    if (!userId) {
      statusEl.textContent = "Error: No user ID provided.";
      throw new Error("Missing uid");
    }

    async function startAd() {
      try {
        statusEl.textContent = "Contacting backend…";

        const res = await fetch(`${BACKEND}/start_ad?user_id=${encodeURIComponent(userId)}`);
        const data = await res.json();

        if (!data.session_token) {
          statusEl.textContent = "Error: Backend did not return a session token.";
          return;
        }

        const token = data.session_token;

        // TODO: Replace with your real video ad network URL
        // Example CPALead format:
        // const adUrl = `https://www.cpalead.com/video?subid=${token}`;

        const adUrl = `https://faucet-backend-uvzt.onrender.com/video?subid=${token}`;

        statusEl.textContent = "Redirecting to video ad…";

        // Redirect user to the video ad
        window.location.href = adUrl;

      } catch (err) {
        statusEl.textContent = "Error starting ad session.";
        console.error(err);
      }
    }

    startAd();
  </script>
</body>
</html>
