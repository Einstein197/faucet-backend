<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch Ad to Unlock Faucet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            max-width: 450px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }
        button {
            background: #238636;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #2ea043;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📺 Watch an Ad to Unlock Faucet</h2>
    <p>Your faucet reward will unlock after completing the ad.</p>

    <!-- ⭐ A-ADS AD UNIT ⭐ -->
    <!-- BEGIN AADS AD UNIT 2433694 -->

	<div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
          <iframe data-aa='2433694' src='//acceptable.a-ads.com/2433694/?size=Adaptive'
                            style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
        </div>

<!-- END AADS AD UNIT 2433694 -->

    <button onclick="finishAd()">I Watched the Ad</button>

    <p id="status" style="margin-top:20px;"></p>
</div>

<script>
    // Extract user_id from URL (?user_id=123)
    const urlParams = new URLSearchParams(window.location.search);
    const user_id = urlParams.get("user_id");

    if (!user_id) {
        document.getElementById("status").innerText = "❌ Error: Missing user_id in URL.";
    }

    // Your backend URL
    const BACKEND = "https://faucet-backend-uvzt.onrender.com";

    async function finishAd() {
        if (!user_id) return;

        // Step 1: Start ad session
        const start = await fetch(`${BACKEND}/start_ad?user_id=${user_id}`);
        if (!start.ok) {
            document.getElementById("status").innerText = "❌ Failed to start ad session.";
            return;
        }

        const html = await start.text();

        // Step 2: Extract session token
        const match = html.match(/session_token=([A-Za-z0-9_\-]+)/);
        if (!match) {
            document.getElementById("status").innerText = "❌ Could not read session token.";
            return;
        }

        const session = match[1];

        // Step 3: Complete the ad
        const res = await fetch(`${BACKEND}/ad_complete?session_token=${session}`);

        if (res.ok) {
            document.getElementById("status").innerText =
                "✅ Ad completed! Return to Discord and run /faucet again.";
        } else {
            document.getElementById("status").innerText =
                "❌ Error completing ad. Try again.";
        }
    }
</script>

</body>
</html>
