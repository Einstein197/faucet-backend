<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KryptonLegend Faucet</title>
  <style>
    body { font-family: system-ui; background: #050816; color: #f5f5f5; display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { background:#0b1020; padding:24px 28px; border-radius:16px; box-shadow:0 0 40px rgba(0,0,0,0.6); width:320px; text-align:center; }
    button { margin-top:16px; padding:10px 16px; border-radius:999px; border:none; background:#ff7a1a; color:#000; font-weight:600; cursor:pointer; }
    button:disabled { opacity:0.5; cursor:default; }
    .status { margin-top:12px; font-size:14px; opacity:0.8; }
  </style>
</head>
<body>
  <div class="card">
    <h2>KryptonLegend Faucet</h2>
    <p>Watch a short video ad to unlock your claim.</p>
    <input id="userId" placeholder="Enter your Discord ID" style="width:100%;padding:8px;border-radius:8px;border:none;margin-top:8px;">
    <button id="watchBtn">Watch Ad</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const BACKEND = "https://faucet-backend-uvzt.onrender.com"; // change if needed
    const watchBtn = document.getElementById("watchBtn");
    const statusEl = document.getElementById("status");
    const userInput = document.getElementById("userId");

    watchBtn.onclick = async () => {
      const userId = userInput.value.trim();
      if (!userId) {
        statusEl.textContent = "Enter your Discord ID first.";
        return;
      }

      watchBtn.disabled = true;
      statusEl.textContent = "Starting ad session...";

      try {
        const res = await fetch(`${BACKEND}/start_ad?user_id=${encodeURIComponent(userId)}`);
        const data = await res.json();
        const token = data.session_token;

        // Example CPALead / video URL – you’ll replace with real one
        const adUrl = `https://your-ad-network.com/video?subid=${encodeURIComponent(token)}`;

        statusEl.textContent = "Opening video ad...";
        window.location.href = adUrl;
      } catch (e) {
        statusEl.textContent = "Error starting ad session.";
        watchBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
