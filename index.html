<!-- BACKEND LOGIC -->
<script>
    const user_id = "{{USER_ID}}";
    const BACKEND = "https://faucet-backend-uvzt.onrender.com";

    let seconds = 20;
    const btn = document.getElementById("adButton");

    const timer = setInterval(() => {
        seconds--;
        btn.innerText = `⏳ Please wait ${seconds} seconds...`;

        if (seconds <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.innerText = "I Watched the Ad";
        }
    }, 1000);

    btn.addEventListener("click", finishAd);

    async function finishAd() {
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const start = await fetch(`${BACKEND}/start_ad?user_id=${user_id}`);
            const html = await start.text();

            const match = html.match(/session_token=([A-Za-z0-9_\-]+)/);
            if (!match) {
                document.getElementById("status").innerText =
                    "❌ Could not get session token.";
                btn.disabled = false;
                btn.innerText = "Try Again";
                return;
            }

            const session = match[1];
            const res = await fetch(`${BACKEND}/ad_complete?session_token=${session}`);

            if (res.ok) {
                document.getElementById("status").innerText =
                    "✅ Ad completed! Returning to Discord...";
                setTimeout(() => window.location.href = "discord://", 2000);
            } else {
                document.getElementById("status").innerText =
                    "❌ Error completing ad.";
                btn.disabled = false;
                btn.innerText = "Try Again";
            }
        } catch (err) {
            document.getElementById("status").innerText =
                "❌ Network error.";
            btn.disabled = false;
            btn.innerText = "Try Again";
        }
    }
</script>
