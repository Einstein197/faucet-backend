<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/static/krypton.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #1a0f00, #ff7a18);
            font-family: "Inter", Arial, sans-serif;
            color: #e6edf3;

        }

        /* CORNER LOGOS */
        .corner-logo {

        /* HEADER */
        .header {
            margin-top: 120px;

        }

        .header h1 {

            margin: 0;
        }

        .header p {
            margin-top: 8px;

        }

        /* ADSTERRA + SIDE ADS ROW */
        .ad-row {
            display: grid;
            grid-template-columns: 180px auto 180px;
            gap: 20px;

            max-width: 1400px;
            margin-top: 40px;

        }

        .side-ads iframe {
            width: 100%;
            border: none;
        }

        .adsterra-block {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }

        /* MAIN CONTENT (NO BOX) */
        .main-content-wrapper {
            width: 100%;
            max-width: 700px;
            margin-top: 40px;
            text-align: center;
        }

        .main-content-text {
            font-size: 14px;
            opacity: 0.75;
            margin-bottom: 16px;
        }

        button {
            background: #238636;
            border: none;
            padding: 14px 22px;
            color: white;
            font-size: 17px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
        }

        button:disabled {
            background: #30363d;
            cursor: not-allowed;
        }

        #status {
            margin-top: 18px;
            font-size: 15px;
        }
    </style>
</head>
<script>
(function() {
    const blockRedirect = (prop) => {
        try {
            Object.defineProperty(window, prop, {
                configurable: false,
                enumerable: true,
                get() { return window[`__${prop}`]; },
                set(v) {
                    console.warn("Blocked redirect attempt:", prop, v);
                }
            });
        } catch (e) {}
    };

    // Save originals
    window.__location = window.location;

    // Block common redirect vectors
    blockRedirect("location");

    // Block top-level redirect attempts
    try {
        Object.defineProperty(top, "location", {
            configurable: false,
            get() { return window.__location; },
            set(v) { console.warn("Blocked top redirect:", v); }
        });
    } catch (e) {}

    // Block window.open hijacks
    const originalOpen = window.open;
    window.open = function(url) {
        console.warn("Blocked window.open redirect:", url);
        return null;
    };
})();
</script>

<body>

<!-- CORNER LOGOS -->
<img src="/static/krypton.png" class="corner-logo tl">
<img src="/static/krypton.png" class="corner-logo tr">
<img src="/static/krypton.png" class="corner-logo bl">
<img src="/static/krypton.png" class="corner-logo br">

<!-- HEADER -->
<div class="header">
    <h1>📺 Watch an Ad to Unlock Faucet</h1>
    <p>Your faucet reward unlocks after completing the ad.</p>
</div>

<!-- ADSTERRA WITH A‑ADS ON BOTH SIDES -->
<div class="ad-row">

    <!-- LEFT A‑ADS -->
    <div class="side-ads">
        <iframe data-aa="2433694" src="//acceptable.a-ads.com/2433694/?size=Adaptive"></iframe>
    </div>

    <!-- ADSTERRA -->
    <div class="adsterra-block">
        <script async data-cfasync="false" src="https://glamournakedemployee.com/1b29b818614dfdaded3b47b2f2ee7524/invoke.js"></script>
        <div id="container-1b29b818614dfdaded3b47b2f2ee7524"></div>
    </div>

    <!-- RIGHT A‑ADS -->
    <div class="side-ads">
        <iframe data-aa="2434032" src="//acceptable.a-ads.com/2434032/?size=Adaptive"></iframe>
    </div>

</div>

<!-- MAIN CONTENT (NO BOX) -->
<div class="main-content-wrapper">
    <p class="main-content-text">
        After clicking the button, this page will return you to Discord automatically.
    </p>

    <button id="adButton" disabled>⏳ Please wait 20 seconds...</button>

    <p id="status"></p>
</div>

<script>
    const user_id = "{{USER_ID}}";
    const BACKEND = "https://faucet-backend-uvzt.onrender.com";

    let seconds = 20;
    const btn = document.getElementById("adButton");

    /* TIMER ALWAYS WORKS — EVEN LOCALLY */
    const timer = setInterval(() => {
        seconds--;
        btn.innerText = `⏳ Please wait ${seconds} seconds...`;

        if (seconds <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.innerText = "I Watched the Ad";
        }
    }, 1000);

    btn.addEventListener("click", finishAd);

    async function finishAd() {
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const start = await fetch(`${BACKEND}/start_ad?user_id=${user_id}`);
            const html = await start.text();

            const match = html.match(/session_token=([A-Za-z0-9_\-]+)/);
            if (!match) {
                document.getElementById("status").innerText =
                    "❌ Could not get session token.";
                btn.disabled = false;
                btn.innerText = "Try Again";
                return;
            }

            const session = match[1];
            const res = await fetch(`${BACKEND}/ad_complete?session_token=${session}`);

            if (res.ok) {
                document.getElementById("status").innerText =
                    "✅ Ad completed! Returning to Discord...";
                setTimeout(() => window.location.href = "discord://", 1000);
            } else {
                document.getElementById("status").innerText =
                    "❌ Error completing ad.";
                btn.disabled = false;
                btn.innerText = "Try Again";
            }
        } catch (err) {
            document.getElementById("status").innerText =
                "❌ Network error.";
            btn.disabled = false;
            btn.innerText = "Try Again";
        }
    }
</script>

</body>
