<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch Ad to Unlock Faucet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SVG Favicon (fixes shrinking/distortion) -->
    <link rel="icon" type="image/png" href="Krypton.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #161b22;
            padding: 25px;
            border-radius: 14px;
            width: 92%;
            max-width: 420px;
            box-shadow: 0 0 20px rgba(0,0,0,0.45);
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* BIG ROUND LOGO */
        .logo-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 0 18px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
        }

        p {
            font-size: 15px;
            opacity: 0.85;
        }

        iframe {
            width: 100% !important;
            max-width: 320px;
            height: auto;
            margin: 15px auto;
            display: block;
        }

        button {
            background: #238636;
            border: none;
            padding: 14px 22px;
            color: white;
            font-size: 17px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            margin-top: 15px;
            transition: 0.2s;
        }

        button:hover {
            background: #2ea043;
            transform: scale(1.03);
        }

        #status {
            margin-top: 18px;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="box">

    <!-- BIG LOGO -->
    <img src="krypton.png" class="logo-img">

    <h2>📺 Watch an Ad to Unlock Faucet</h2>
    <p>Your faucet reward will unlock after completing the ad.</p>

    <!-- ⭐ A-ADS AD UNIT ⭐ -->
    <div id="frame">
        <iframe data-aa="2433694"
                src="//acceptable.a-ads.com/2433694/?size=Adaptive"
                style="border:0; padding:0; overflow:hidden;">
        </iframe>
    </div>

    <button onclick="finishAd()">I Watched the Ad</button>

    <p id="status"></p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const user_id = urlParams.get("user_id");

    if (!user_id) {
        document.getElementById("status").innerText = "❌ Error: Missing user_id in URL.";
    }

    const BACKEND = "https://faucet-backend-uvzt.onrender.com";

    async function finishAd() {
        if (!user_id) return;

        const start = await fetch(`${BACKEND}/start_ad?user_id=${user_id}`);
        if (!start.ok) {
            document.getElementById("status").innerText = "❌ Failed to start ad session.";
            return;
        }

        const html = await start.text();
        const match = html.match(/session_token=([A-Za-z0-9_\-]+)/);

        if (!match) {
            document.getElementById("status").innerText = "❌ Could not read session token.";
            return;
        }

        const session = match[1];
        const res = await fetch(`${BACKEND}/ad_complete?session_token=${session}`);

        if (res.ok) {
            document.getElementById("status").innerText =
                "✅ Ad completed! Return to Discord and run /faucet again.";
        } else {
            document.getElementById("status").innerText =
                "❌ Error completing ad. Try again.";
        }
    }
</script>

</body>
</html>
